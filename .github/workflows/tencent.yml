name: Build and Push to Tencent TCR

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: dywongtinfoil.tencentcloudcr.com
  IMAGE_NAME: csig/dylanclaw

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only login when NOT a PR
      - name: Login to Tencent TCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: dywongtinfoil.tencentcloudcr.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build (PR = no push, main = push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            dywongtinfoil.tencentcloudcr.com/${{ env.IMAGE_NAME }}:latest
            dywongtinfoil.tencentcloudcr.com/${{ env.IMAGE_NAME }}:${{ github.sha }}
